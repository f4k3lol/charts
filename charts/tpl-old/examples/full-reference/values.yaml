# ============================================================================
# Full reference example for tpl chart — every possible value documented.
# Usage: helm install --dry-run test . -f test.yaml --disable-openapi-validation
# ============================================================================

# --- Workload kind -----------------------------------------------------------
# Can be "Deployment" (default) or "StatefulSet".
kind: Deployment

# --- Replica count -----------------------------------------------------------
# Ignored when autoscaling.enabled is true (Deployment only).
replicas: 2

# --- Pod-level settings ------------------------------------------------------

imagePullSecrets:
  - name: my-registry-secret

# Override chart name / fullname in rendered labels and resource names.
# nameOverride is important in multi-dependency mode for unique selectorLabels.
nameOverride: ""
fullnameOverride: ""

podAnnotations:
  # Supports tpl rendering — you can reference chart values:
  # example: "{{ .Release.Name }}-app"
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Disable k8s default service env vars injected into pods.
enableServiceLinks: false

nodeSelector:
  kubernetes.io/os: linux

topologySpreadConstraints:
  # Note: labelSelector is auto-injected with chart selectorLabels.
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "app"
    effect: "NoSchedule"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [tpl]
          topologyKey: kubernetes.io/hostname

terminationGracePeriodSeconds: 60

restartPolicy: ""  # Default; set "Always", "OnFailure", "Never" if needed.

serviceAccountName: my-service-account

# --- Deployment strategy (kind: Deployment only) ----------------------------
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# --- HPA (kind: Deployment only) --------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

# --- StatefulSet-specific (kind: StatefulSet) --------------------------------
# Uncomment these if kind: StatefulSet
# serviceName: my-app-headless
# minReadySeconds: 10
# podManagementPolicy: OrderedReady  # or "Parallel"
# updateStrategy:
#   type: RollingUpdate
#   rollingUpdate:
#     partition: 0
# persistentVolumeClaimRetentionPolicy:
#   whenDeleted: Retain
#   whenScaled: Delete
# volumeClaimTemplates:
#   - metadata:
#       name: data
#     spec:
#       accessModes: ["ReadWriteOnce"]
#       storageClassName: fast-ssd
#       resources:
#         requests:
#           storage: 10Gi

# --- Default container -------------------------------------------------------
# Merged into every container in `containers` map.
# Top-level defaultContainer overrides global.defaultContainer.
defaultContainer:
  image:
    registry: docker.io
    baseRepository: myorg
    # repository: per-container  (usually set per container)
    # tag: latest                (usually set per container)
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# --- Default service ---------------------------------------------------------
# Merged into every service in `services` map.
defaultService:
  type: ClusterIP
  annotations: {}

# --- Default ingress ---------------------------------------------------------
# Merged into every ingress in `services.*.ingresses.*`.
defaultIngress:
  className: nginx
  defaultPathType: ImplementationSpecific
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  tls: []
  hosts: []
  paths:
    - path: /

# --- Default VolumeClaimTemplate --------------------------------------------
# Merged into each entry in `volumeClaimTemplates` (StatefulSet).
defaultVolumeClaimTemplate:
  spec:
    accessModes: ["ReadWriteOnce"]

# --- Containers --------------------------------------------------------------
# Map of container_name -> container_spec.
# Each is merged with defaultContainer before rendering.
containers:
  # Main application container
  app:
    image:
      # registry/baseRepository inherited from defaultContainer
      repository: my-app
      tag: "1.2.3"
    # Override imagePullPolicy per container
    imagePullPolicy: Always

    ports:
      - name: http
        containerPort: 8080
        protocol: TCP
      - name: metrics
        containerPort: 9090
        protocol: TCP

    # Override default resources for this container
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false

    command: ["/bin/sh"]
    args: ["-c", "exec /app/server"]

    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /ready
        port: http
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 2
      successThreshold: 1
      failureThreshold: 3

    # Environment variables — three styles:
    env:
      # 1) Plain value (supports tpl rendering)
      APP_NAME:
        value: my-app
      LOG_LEVEL:
        value: info
      RELEASE_NAME:
        value: "{{ .Release.Name }}"  # tpl rendered at deploy time

      # 2) Value from ConfigMap key
      DB_HOST:
        value: null  # must be null/empty to trigger valueFrom
        from: configMap
        name: app-config
        key: db-host

      # 3) Value from Secret key
      DB_PASSWORD:
        from: secret
        name: app-secrets
        key: db-password

    # Mount files from ConfigMaps/Secrets into the container.
    # Each config mounts a single key as a file (readOnly, with subPath).
    configs:
      app-config-file:
        mountPath: /etc/app/config.yaml
        from: configMap
        name: app-config
        key: config.yaml
      tls-cert:
        mountPath: /etc/tls/cert.pem
        from: secret
        name: tls-secret
        key: cert.pem

    # Arbitrary volume mounts.
    volumes:
      - name: tmp
        emptyDir: {}
        mountPath: /tmp
      - name: cache
        emptyDir:
          sizeLimit: 100Mi
        mountPath: /var/cache
      - name: data
        existingClaim: my-pvc
        mountPath: /data
        subPath: app-data

  # Sidecar container (e.g., log collector)
  sidecar:
    image:
      repository: fluentbit
      tag: "2.1"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    env:
      FLUSH_INTERVAL:
        value: "5"
    volumes:
      - name: tmp
        emptyDir: {}
        mountPath: /tmp

# --- Services ----------------------------------------------------------------
# Map of service_name -> service_spec.
# Each is merged with defaultService before rendering.
services:
  my-app:
    type: ClusterIP
    annotations:
      # Supports tpl rendering
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
    ports:
      - name: http
        port: 80
        targetPort: 8080      # defaults to `port` if omitted
        protocol: TCP
      - name: metrics
        port: 9090
        # targetPort defaults to 9090

    # Ingresses nested under the service they route to.
    # Backend service name is always the parent service (my-app here).
    ingresses:
      my-app-public:
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/rate-limit: "100"
          # Supports tpl rendering
          # nginx.ingress.kubernetes.io/server-snippet: "{{ .Values.global.snippet }}"
        tls:
          - secretName: my-app-tls
            hosts:
              - app.example.com
        hosts:
          - app.example.com
        paths:
          - path: /
            type: Prefix
          - path: /api
            type: Prefix
        servicePortNumber: 80
        # Or use servicePortName instead:
        # servicePortName: http

      my-app-internal:
        className: nginx-internal
        hosts:
          - app.internal.local
        paths:
          - path: /
        servicePortName: http

  # Headless service example
  my-app-headless:
    clusterIP: None
    ports:
      - name: http
        port: 8080

  # NodePort example
  # my-app-nodeport:
  #   type: NodePort
  #   ports:
  #     - name: http
  #       port: 80
  #       targetPort: 8080
  #       nodePort: 30080

  # LoadBalancer example
  # my-app-lb:
  #   type: LoadBalancer
  #   loadBalancerIP: 10.0.0.100
  #   ports:
  #     - name: http
  #       port: 80
  #       targetPort: 8080

  # ExternalName example
  # external-db:
  #   type: ExternalName
  #   externalName: db.example.com

# --- ConfigMaps --------------------------------------------------------------
# Map of configmap_name -> spec with `data` and optional `labels`/`annotations`.
# Values inside `data` support tpl rendering.
configMaps:
  app-config:
    labels:
      app.kubernetes.io/component: config
    annotations:
      description: "Main application config"
    data:
      db-host: "postgres.default.svc.cluster.local"
      config.yaml: |
        server:
          port: 8080
          graceful_shutdown: 30s
        database:
          pool_size: 10

# --- Secrets -----------------------------------------------------------------
# Map of secret_name -> spec with `stringData`/`data`, optional `type`, `labels`, `annotations`.
# `stringData` values support tpl rendering. `data` expects base64-encoded values.
secrets:
  app-secrets:
    type: Opaque  # default; also: kubernetes.io/tls, kubernetes.io/dockerconfigjson, etc.
    labels:
      app.kubernetes.io/component: secrets
    annotations: {}
    stringData:
      db-password: "supersecret123"
      # tpl rendering example:
      # connection-string: "postgres://user:pass@{{ .Values.global.dbHost }}:5432/app"
    # Or base64-encoded:
    # data:
    #   db-password: c3VwZXJzZWNyZXQxMjM=

  tls-secret:
    type: kubernetes.io/tls
    stringData:
      cert.pem: |
        -----BEGIN CERTIFICATE-----
        ...
        -----END CERTIFICATE-----
      key.pem: |
        -----BEGIN PRIVATE KEY-----
        ...
        -----END PRIVATE KEY-----

# --- Extra manifests ---------------------------------------------------------
# List of raw YAML strings, rendered as-is (supports tpl rendering).
# Use for any resource the chart doesn't natively support.
extraManifests:
  - |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: my-service-account
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: my-app-role
    rules:
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list"]
  - |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: my-app-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: tpl
          app.kubernetes.io/instance: {{ .Release.Name }}
