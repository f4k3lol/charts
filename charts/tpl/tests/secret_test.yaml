suite: secret
templates:
  - secret.yaml

tests:
  - it: "renders a Secret"
    set:
      secrets:
        app-secrets:
          stringData:
            password: "supersecret"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.password
          value: "supersecret"

  - it: "renders nothing when secrets is empty"
    asserts:
      - hasDocuments:
          count: 0

  - it: "sets type Opaque by default"
    set:
      secrets:
        app-secrets:
          stringData:
            key: value
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: "sets custom type"
    set:
      secrets:
        tls-cert:
          type: kubernetes.io/tls
          stringData:
            tls.crt: "cert-data"
            tls.key: "key-data"
    asserts:
      - equal:
          path: type
          value: kubernetes.io/tls

  - it: "renders docker registry secret"
    set:
      secrets:
        registry:
          type: kubernetes.io/dockerconfigjson
          stringData:
            .dockerconfigjson: '{"auths":{}}'
    asserts:
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson

  - it: "renders base64 data"
    set:
      secrets:
        app-secrets:
          data:
            auth: "dXNlcjpwYXNz"
    asserts:
      - equal:
          path: data.auth
          value: "dXNlcjpwYXNz"

  - it: "commonLabels appear on Secret"
    set:
      commonLabels:
        team: backend
      secrets:
        app-secrets:
          stringData:
            key: value
    asserts:
      - equal:
          path: metadata.labels.team
          value: backend

  - it: "tpl-evaluates template expressions in stringData"
    set:
      global:
        defaultUser: alice
      secrets:
        creds:
          stringData:
            user: "{{ $.Values.global.defaultUser }}"
    asserts:
      - equal:
          path: stringData.user
          value: "alice"

  - it: "tpl-evaluates sprig htpasswd in stringData"
    set:
      global:
        defaultUser: bob
        defaultPass: hunter2
      secrets:
        basicauth:
          stringData:
            auth: "{{ htpasswd $.Values.global.defaultUser $.Values.global.defaultPass }}"
    asserts:
      - matchRegex:
          path: stringData.auth
          pattern: "^bob:\\$2a\\$"

  - it: "tpl-evaluates template expressions in data"
    set:
      global:
        encoded: "dXNlcjpwYXNz"
      secrets:
        creds:
          data:
            auth: "{{ $.Values.global.encoded }}"
    asserts:
      - equal:
          path: data.auth
          value: "dXNlcjpwYXNz"
