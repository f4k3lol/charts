{{- range $name, $spec := .Values.networkPolicies }}
{{- if not (and (hasKey $spec "enabled") (not $spec.enabled)) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  {{- include "tpl.metadata" (dict "context" $ "name" $name "labels" $spec.labels "annotations" $spec.annotations) | nindent 2 }}
spec:
  {{- if kindIs "map" $spec.podSelector }}
  podSelector: {{ if $spec.podSelector }}{{ toYaml $spec.podSelector | nindent 4 }}{{ else }}{}{{ end }}
  {{- end }}
  {{- with $spec.policyTypes }}
  policyTypes: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- if kindIs "slice" $spec.ingress }}
  ingress: {{ if $spec.ingress }}{{ toYaml $spec.ingress | nindent 4 }}{{ else }}[]{{ end }}
  {{- end }}
  {{- if kindIs "slice" $spec.egress }}
  egress: {{ if $spec.egress }}{{ toYaml $spec.egress | nindent 4 }}{{ else }}[]{{ end }}
  {{- end }}
{{- end }}
{{- end }}
