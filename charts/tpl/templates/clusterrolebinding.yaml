{{- range $name, $spec := .Values.clusterRoleBindings }}
{{- if not (and (hasKey $spec "enabled") (not $spec.enabled)) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tpl.resourceName" (dict "context" $ "name" $name) }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- with $spec.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or $spec.annotations $.Values.commonAnnotations }}
  annotations:
    {{- with $.Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with $spec.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
roleRef:
  {{- toYaml $spec.roleRef | nindent 2 }}
subjects:
  {{- toYaml $spec.subjects | nindent 2 }}
{{- end }}
{{- end }}
