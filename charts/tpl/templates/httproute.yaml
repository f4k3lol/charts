{{/*
Renders top-level httpRoutes AND nested httpRoutes under services.
*/}}

{{- /* Top-level httpRoutes */ -}}
{{- range $name, $spec := .Values.httpRoutes }}
{{- if not (and (hasKey $spec "enabled") (not $spec.enabled)) }}
{{- $defaults := $.Values.defaultHttpRoute | default dict }}
{{- $merged := fromYaml (include "tpl.mergeDeep" (dict "base" $defaults "override" $spec)) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  {{- include "tpl.metadata" (dict "context" $ "name" $name "labels" $merged.labels "annotations" $merged.annotations) | nindent 2 }}
spec:
  {{- with $merged.parentRefs }}
  parentRefs: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with $merged.hostnames }}
  hostnames: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with $merged.rules }}
  rules:
    {{- range . }}
    - {{- with .matches }}
      matches: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .backendRefs }}
      backendRefs: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters: {{ toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}

{{- /* Nested httpRoutes under services */ -}}
{{- range $svcName, $svcSpec := .Values.services }}
{{- range $routeName, $routeSpec := ($svcSpec.httpRoutes | default dict) }}
{{- if ne (toString (default true $routeSpec.enabled)) "false" }}
{{- $defaults := $.Values.defaultHttpRoute | default dict }}
{{- $merged := fromYaml (include "tpl.mergeDeep" (dict "base" $defaults "override" $routeSpec)) }}
{{- $svcFullName := include "tpl.resourceName" (dict "context" $ "name" $svcName) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  {{- include "tpl.metadata" (dict "context" $ "name" $routeName "labels" $merged.labels "annotations" $merged.annotations) | nindent 2 }}
spec:
  {{- with $merged.parentRefs }}
  parentRefs: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with $merged.hostnames }}
  hostnames: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with $merged.rules }}
  rules:
    {{- range . }}
    - {{- with .matches }}
      matches: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if .backendRefs }}
      backendRefs: {{ toYaml .backendRefs | nindent 8 }}
      {{- else if .servicePortNumber }}
      backendRefs:
        - name: {{ $svcFullName }}
          port: {{ .servicePortNumber }}
      {{- end }}
      {{- with .filters }}
      filters: {{ toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
