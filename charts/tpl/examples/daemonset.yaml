# DaemonSet — Fluent Bit log collector on every node
daemonSets:
  log-collector:
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
    tolerations:
      - operator: Exists
    podSecurityContext:
      runAsUser: 0
    volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: containers
        hostPath:
          path: /var/lib/docker/containers
    containers:
      fluentbit:
        image:
          registry: cr.fluentbit.io
          repository: fluent/fluent-bit
          tag: "3.1"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
        ports:
          - name: metrics
            containerPort: 2020
            protocol: TCP
        volumeMounts:
          - name: varlog
            mountPath: /var/log
            readOnly: true
          - name: containers
            mountPath: /var/lib/docker/containers
            readOnly: true
