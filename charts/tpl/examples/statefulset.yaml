# StatefulSet — Redis cluster with headless service
statefulSets:
  redis:
    replicas: 3
    serviceName: redis-headless
    podManagementPolicy: OrderedReady
    updateStrategy:
      type: RollingUpdate
    persistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Delete
    volumeClaimTemplates:
      - metadata:
          name: data
        spec:
          storageClassName: fast-ssd
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    containers:
      redis:
        image:
          repository: redis
          tag: "7.2-alpine"
        ports:
          - name: redis
            containerPort: 6379
            protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          periodSeconds: 5
        volumeMounts:
          - name: data
            mountPath: /data

services:
  redis-headless:
    clusterIP: None
    publishNotReadyAddresses: true
    ports:
      - name: redis
        port: 6379
