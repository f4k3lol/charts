# =============================================================================
# tpl v1.0.0 — default values
# See examples/full-reference.yaml for all available keys with documentation.
# =============================================================================

# -- Chart identity
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}
global: {}

# -- Defaults (merged into every resource of the corresponding type)
defaultPod:
  enableServiceLinks: false
defaultContainer: {}
defaultService: {}
defaultIngress:
  defaultPathType: ImplementationSpecific
defaultHttpRoute: {}
defaultGrpcRoute: {}
defaultTcpRoute: {}
defaultTlsRoute: {}
defaultVolumeClaimTemplate:
  spec:
    accessModes: ["ReadWriteOnce"]

# -- Workloads
deployments: {}
statefulSets: {}
daemonSets: {}
jobs: {}
cronJobs: {}

# -- Networking
services: {}
ingresses: {}
httpRoutes: {}
grpcRoutes: {}
tcpRoutes: {}
tlsRoutes: {}
gateways: {}
networkPolicies: {}

# -- Config / Storage
configMaps: {}
secrets: {}
persistentVolumeClaims: {}

# -- Cluster resources
serviceAccounts: {}
podDisruptionBudgets: {}

# -- Monitoring
serviceMonitors: {}
podMonitors: {}

# -- Escape hatch
extraManifests: []
