# -- Workload kind: Deployment (default) or StatefulSet
kind: Deployment

# -- Replica count (ignored when autoscaling.enabled is true)
replicas: 1

# -- Image pull secrets
imagePullSecrets: []

# -- Override chart name in labels (important in multi-dependency mode)
nameOverride: ""
# -- Override full resource name
fullnameOverride: ""

# -- Pod annotations (supports tpl rendering)
podAnnotations: {}
# -- Pod security context
podSecurityContext: {}
# -- Inject k8s service env vars into pods
enableServiceLinks: false
# -- Node selector
nodeSelector: {}
# -- Topology spread constraints (labelSelector auto-injected)
topologySpreadConstraints: []
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}
# -- Termination grace period
terminationGracePeriodSeconds: null
# -- Pod restart policy
restartPolicy: ""
# -- Service account name
serviceAccountName: ""

# -- Deployment strategy (kind: Deployment only)
strategy:
  type: RollingUpdate

# -- HPA settings (kind: Deployment only)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 20
  behavior: {}
  metrics: []

# -- StatefulSet: service name
serviceName: ""
# -- StatefulSet: min ready seconds
minReadySeconds: 0
# -- StatefulSet: pod management policy
podManagementPolicy: OrderedReady
# -- StatefulSet: update strategy
updateStrategy: {}
# -- StatefulSet: PVC retention policy
persistentVolumeClaimRetentionPolicy: {}
# -- StatefulSet: volume claim templates
volumeClaimTemplates: []

# -- Defaults merged into each container
defaultContainer: {}
# -- Defaults merged into each service
defaultService: {}
# -- Defaults merged into each ingress
defaultIngress: {}
# -- Defaults merged into each volumeClaimTemplate
defaultVolumeClaimTemplate:
  spec:
    accessModes: ["ReadWriteOnce"]

# -- Containers map (name -> spec)
containers: {}
# -- Services map (name -> spec)
services: {}
# -- ConfigMaps map (name -> spec)
configMaps: {}
# -- Secrets map (name -> spec)
secrets: {}
# -- Raw manifests rendered as-is (supports tpl rendering)
extraManifests: []
